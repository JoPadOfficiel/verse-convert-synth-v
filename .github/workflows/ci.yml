name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  quality:
    name: Frontend and Rust quality gates
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Check out the exact revision
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable action
        with:
          toolchain: 1.93.0
          components: rustfmt, clippy

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Install frontend dependencies reproducibly
        run: npm ci

      - name: Verify synchronized versions
        run: node scripts/check-version.mjs

      - name: Run frontend tests
        run: npm run test:frontend

      - name: Build frontend
        run: npm run build

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Lint all Rust targets
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --locked -- -D warnings

      - name: Run all Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked
