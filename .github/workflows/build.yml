name: build-verse

# Builds Verse for every desktop platform and architecture and attaches the
# installers to the GitHub Release. Triggered by pushing a v* tag (e.g. v1.0.0).
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # 1. Run the engine tests once (pure Rust logic, platform-independent).
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - run: npm install
      - run: npm run build
      - name: Engine tests
        working-directory: src-tauri
        run: cargo test

  # 2. Create a draft release the build jobs will upload to.
  create-release:
    needs: test
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/github-script@v7
        id: create
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              draft: true,
              prerelease: false,
              generate_release_notes: true,
            });
            return data.id;

  # 3. Build every platform/architecture and upload to the draft release.
  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest      # macOS Apple Silicon
            target: aarch64-apple-darwin
          - platform: macos-latest      # macOS Intel
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04      # Linux x64
            target: x86_64-unknown-linux-gnu
          - platform: ubuntu-22.04-arm  # Linux ARM64
            target: aarch64-unknown-linux-gnu
          - platform: windows-latest    # Windows x64
            target: x86_64-pc-windows-msvc
          - platform: windows-latest    # Windows ARM64
            target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - run: npm install

      - name: Build and upload (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.target }}

  # 4. Publish (undraft) the release once every build succeeded.
  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            });
