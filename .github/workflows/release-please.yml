name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Prepare release
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release-created: ${{ steps.release.outputs.release_created }}
      tag-name: ${{ steps.release.outputs.tag_name }}
      release-sha: ${{ steps.release.outputs.sha }}

    steps:
      - name: Create or update the release pull request
        id: release
        uses: googleapis/release-please-action@0dfd8538845b8e92600d271a895a5372865d4062 # v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-release:
    name: Build released revision
    needs:
      - release-please
    if: needs.release-please.outputs.release-created == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/build.yml
    with:
      tag: ${{ needs.release-please.outputs.tag-name }}
      commit_sha: ${{ needs.release-please.outputs.release-sha }}
      publish_release: true
    secrets: inherit
